name: Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-placeholder-not-used
      AUTH_GOOGLE_ID: ci-placeholder
      AUTH_GOOGLE_SECRET: ci-placeholder
      MONGODB_URI: mongodb://placeholder:27017/test
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ci-placeholder
      AWS_SECRET_ACCESS_KEY: ci-placeholder
      SES_FROM_EMAIL: noreply@example.com
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - name: Checkout Yamaha
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Start Next.js app in background
        run: |
          nohup npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server to be ready
        run: npx --yes wait-on http://localhost:3000 --timeout 60000

      - name: Checkout Playwright tests
        uses: actions/checkout@v5
        with:
          repository: RomanSKL/playwright-yamaha
          ref: main
          path: playwright-tests

      - name: Install Playwright test dependencies
        working-directory: playwright-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright-tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against local build
        working-directory: playwright-tests
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-tests/playwright-report
          retention-days: 7

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 45.76.252.245
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/yamaha
            git pull
            docker compose up --build -d
